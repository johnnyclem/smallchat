# docker-compose.yml — smallchat local development stack
#
# Services:
#   smallchat  — The MCP runtime server
#   redis      — Optional caching layer (for future cache backend)
#   otel       — OpenTelemetry Collector (traces → Jaeger)
#   jaeger     — Distributed tracing UI
#
# Usage:
#   docker compose up -d              # Start everything
#   docker compose up smallchat       # Just the server
#   docker compose logs -f smallchat  # Follow logs
#   docker compose down -v            # Tear down + remove volumes

version: "3.9"

services:
  # ============================================================
  # smallchat MCP Server
  # ============================================================
  smallchat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: smallchat:latest
    container_name: smallchat
    restart: unless-stopped
    ports:
      - "${SC_PORT:-3001}:3001"
    volumes:
      # Persist database and flight recorder outside container
      - smallchat-data:/data
      # Mount your tool manifests (hot-reload friendly)
      - ./examples:/app/examples:ro
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      SC_LOG_LEVEL: ${SC_LOG_LEVEL:-info}
      SC_LOG_PRETTY: ${SC_LOG_PRETTY:-0}
      SC_DB_PATH: /data/smallchat.db
      SC_FR_FILE: /data/smallchat-flight.ndjson
      SC_FR_MAX_ENTRIES: ${SC_FR_MAX_ENTRIES:-500}
      # OpenTelemetry → collector sidecar
      SC_OTEL_ENDPOINT: http://otel-collector:4318
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - smallchat-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smallchat.rule=Host(`smallchat.localhost`)"

  # ============================================================
  # Redis — Optional caching backend
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: smallchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smallchat-net

  # ============================================================
  # OpenTelemetry Collector
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: smallchat-otel
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics export
    volumes:
      - ./otel-config.yml:/etc/otelcol/config.yaml:ro
    networks:
      - smallchat-net
    profiles:
      - observability

  # ============================================================
  # Jaeger — Distributed Tracing UI
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: smallchat-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC for OTel collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - smallchat-net
    profiles:
      - observability

  # ============================================================
  # Debug UI (development only)
  # ============================================================
  debug-ui:
    image: node:22-alpine
    container_name: smallchat-debug-ui
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./packages/debug-ui:/app
    environment:
      VITE_API_BASE: http://smallchat:3001
    depends_on:
      - smallchat
    networks:
      - smallchat-net
    profiles:
      - dev

volumes:
  smallchat-data:
  redis-data:

networks:
  smallchat-net:
    driver: bridge
